controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 50.0
    odom_topic: /dsdbot_base_controller/odom
    odom_duration: 0.1
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    progress_checker_plugins: ["progress_checker"] # progress_checker_plugin: "progress_checker" For Humble and older
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["DWB", "MPPI"]
    speed_limit_topic: "speed_limit"

    progress_checker:
      plugin: "nav2_controller::PoseProgressChecker"
      required_movement_radius: 0.0005 # m, 평면 이동 반경 임계값(상위 클래스)
      required_movement_angle: 0.00872665 # rad, 약 5도 (회전 진행 임계값)
      movement_time_allowance: 9999.0

    goal_checker:
      plugin: "nav2_controller::StoppedGoalChecker"
      xy_goal_tolerance: 0.003 # 목표 위치 x, y 허용 오차(double, Default=0.25)
      yaw_goal_tolerance: 0.01 # ~0.57°, 센서오프셋 510mm에서 5.1mm 센서오차 이내
      stateful: false # Whether to check for XY position tolerance after rotating to goal orientation in case of minor localization changes.
      trans_stopped_velocity: 0.0005 # m/s
      rot_stopped_velocity: 0.0005 # rad/s

    DWB:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      min_vel_x: -0.1
      min_vel_y: -0.1
      max_vel_x: 0.1
      max_vel_y: 0.1
      max_vel_theta: 0.1
      min_speed_xy: 0.0
      min_speed_theta: 0.0
      acc_lim_x: 1.5
      acc_lim_y: 1.5
      acc_lim_theta: 1.5
      decel_lim_x: -1.5
      decel_lim_y: -1.5
      decel_lim_theta: -1.5
      vx_samples: 10
      vy_samples: 10
      vtheta_samples: 5
      sim_time: 0.3
      linear_granularity: 0.001
      angular_granularity: 0.025
      transform_tolerance: 1.0
      xy_goal_tolerance: 0.002
      trans_stopped_velocity: 0.0005
      short_circuit_trajectory_evaluation: False
      limit_vel_cmd_in_traj: False
      stateful: False
      critics: [
          # "RotateToGoal",
          # "Oscillation",
          # "BaseObstacle",
          # "ObstacleFootprint",
          "GoalAlign",    # heading 방향 기반 scoring (costmap cell 해상도 무관)
          # "PathAlign",
          "PathDist",
          "GoalDist",
          # "Twirling",
        ]
      BaseObstacle.sum_scores: true
      BaseObstacle.scale: 20.0
      ObstacleFootprint.sum_scores: True
      ObstacleFootprint.scale: 30.0
      Oscillation.oscillation_reset_dist: 0.01
      Oscillation.oscillation_reset_angle: 0.34
      Oscillation.oscillation_reset_time: 4.0
      PathAlign.scale: 5.0
      PathAlign.forward_point_distance: 0.001
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.001
      PathDist.scale: 10.0
      GoalDist.scale: 50.0
      RotateToGoal.scale: 20.0
      RotateToGoal.slowing_factor: 1.0
      RotateToGoal.lookahead_time: -1.0
      RotateToGoal.xy_goal_tolerance: 0.002
      Twirling.scale: 40.0

    MPPI:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 20
      model_dt: 0.05
      batch_size: 2000
      vx_std: 0.01
      vy_std: 0.01
      wz_std: 0.02
      # 최대 속도 제한 (도킹 정밀도를 위해 축소)
      vx_max: 0.1
      vx_min: -0.1
      vy_max: 0.1
      vy_min: -0.1
      wz_max: 0.2
      # 가속도 제한
      ax_max: 1.0
      ax_min: -1.0
      ay_max: 1.0
      ay_min: -1.0
      az_max: 1.0
      iteration_count: 2
      temperature: 0.3
      gamma: 0.015
      motion_model: "Omni"
      visualize: true
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      TrajectoryValidator:
        plugin: "mppi::DefaultOptimalTrajectoryValidator"
        collision_lookahead_time: 2.0
        consider_footprint: false
      critics: [
          "ConstraintCritic",
          "CostCritic",
          "GoalCritic",
          "GoalAngleCritic",
          # "PathAlignCritic",  # 3cm 경로에서 GoalCritic과 충돌 → 비활성화
          # "PathFollowCritic", # 3cm 경로에서 GoalCritic과 충돌 → 비활성화
          # "PathAngleCritic",
          "VelocityDeadbandCritic",
          # "TwirlingCritic",   # 정밀 도킹에서 불필요 → 비활성화
        ]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 20.0
        threshold_to_consider: 0.5
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
        threshold_to_consider: 0.2
      # ObstaclesCritic:
      #   enabled: true
      #   cost_power: 1
      #   repulsion_weight: 1.5
      #   critical_weight: 20.0
      #   consider_footprint: false
      #   collision_cost: 10000.0
      #   collision_margin_distance: 0.1
      #   near_goal_distance: 0.5
      #   inflation_radius: 0.55 # (only in Humble)
      #   cost_scaling_factor: 10.0 # (only in Humble)
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: false
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0
      VelocityDeadbandCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
        deadband_velocities: [0.001, 0.001, 0.001]
      TwirlingCritic:
        enabled: true
        twirling_cost_power: 1
        twirling_cost_weight: 10.0

local_costmap:
  local_costmap:
    ros__parameters:
      transform_tolerance: 1.0
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 9
      height: 9
      resolution: 0.01
      footprint: "[ [0.95, 0.61], [0.95, -0.61], [-0.95, -0.61], [-0.95, 0.61] ]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan scan2
        scan:
          topic: /scan/front
          raytrace_max_range: 5.0
          obstacle_max_range: 5.0
          obstacle_min_range: 0.1
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          inf_is_valid: true
          data_type: "LaserScan"
        scan2:
          topic: /scan/rear
          raytrace_max_range: 5.0
          obstacle_max_range: 5.0
          obstacle_min_range: 0.1
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          inf_is_valid: true
          data_type: "LaserScan"
        observation_persistence: 1.0
      inflation_layer:
        plugin: 