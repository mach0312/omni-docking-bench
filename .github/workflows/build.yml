name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  colcon-build:
    runs-on: ubuntu-24.04
    container:
      image: ros:jazzy-ros-base
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3-colcon-common-extensions \
            python3-rosdep \
            python3-matplotlib \
            python3-numpy \
            ros-jazzy-ros2-control \
            ros-jazzy-ros2-controllers \
            ros-jazzy-nav2-bringup \
            ros-jazzy-nav2-controller \
            ros-jazzy-nav2-common \
            ros-jazzy-nav2-lifecycle-manager \
            ros-jazzy-nav2-util \
            ros-jazzy-nav2-msgs \
            ros-jazzy-tf2-ros \
            ros-jazzy-tf2-geometry-msgs \
            ros-jazzy-backward-ros \
            git

      - name: Build (excluding the binary plugin)
        shell: bash
        run: |
          set -e
          source /opt/ros/jazzy/setup.bash
          # We do NOT ship libdouble_steering_drive_controller.so in git; it
          # arrives via GitHub Releases. CI therefore skips that package and
          # only verifies the open-source parts build cleanly.
          rosdep install --from-paths src -yir \
            --skip-keys "double_steering_drive_controller"
          colcon build \
            --packages-skip double_steering_drive_controller \
            --cmake-args -DCMAKE_BUILD_TYPE=Release

      - name: Check package manifests parse
        shell: bash
        run: |
          set -e
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          ros2 pkg list | grep -E "dsd_bot_description|dsd_control_demo|pgv_guided_controller|icros_test_setup"

      - name: Ament lint (python style)
        shell: bash
        continue-on-error: true
        run: |
          set -e
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          colcon test \
            --packages-select pgv_guided_controller icros_test_setup \
            --event-handlers console_direct+ || true
          colcon test-result --verbose || true
