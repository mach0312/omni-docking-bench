name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  colcon-build:
    runs-on: ubuntu-24.04
    container:
      image: ros:jazzy-ros-base
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3-colcon-common-extensions \
            python3-rosdep \
            python3-matplotlib \
            python3-numpy \
            ros-jazzy-ros2-control \
            ros-jazzy-ros2-controllers \
            ros-jazzy-controller-manager \
            ros-jazzy-joint-state-broadcaster \
            ros-jazzy-robot-state-publisher \
            ros-jazzy-xacro \
            ros-jazzy-nav2-bringup \
            ros-jazzy-nav2-controller \
            ros-jazzy-nav2-common \
            ros-jazzy-nav2-lifecycle-manager \
            ros-jazzy-nav2-util \
            ros-jazzy-nav2-msgs \
            ros-jazzy-tf2-ros \
            ros-jazzy-tf2-geometry-msgs \
            ros-jazzy-backward-ros \
            git

      - name: Create stub .so for CI build verification
        shell: bash
        run: |
          # The real libdouble_steering_drive_controller.so is distributed via
          # GitHub Releases (not git-tracked) — see libs/.../README.md. For CI
          # we only need to verify that everything *compiles*; the stub below
          # lets the wrapper package (which expects the file to exist) install
          # cleanly so that downstream packages (dsd_control_demo) can in turn
          # find its environment (package.sh) when colcon sources upstream deps.
          mkdir -p libs/double_steering_drive_controller/lib
          : > libs/double_steering_drive_controller/lib/libdouble_steering_drive_controller.so

      - name: Build all packages
        shell: bash
        run: |
          set -e
          source /opt/ros/jazzy/setup.bash
          # GUI / demo-only / CLI-only rosdep keys are skipped — they are
          # runtime conveniences and not required for `colcon build` to
          # produce working library/launch/config install trees.
          # `ament_python` is an ament-internal buildtool with no rosdep
          # mapping; it is already present in the ROS base image.
          rosdep update || true
          rosdep install --from-paths src -yir \
            --skip-keys "double_steering_drive_controller \
                         ros2_control_demo_description \
                         ros2_controllers_test_nodes \
                         ros2controlcli \
                         ros2launch \
                         joint_state_publisher_gui \
                         rviz2 \
                         ament_python"
          colcon build \
            --cmake-args -DCMAKE_BUILD_TYPE=Release

      - name: Check package manifests parse
        shell: bash
        run: |
          set -e
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          ros2 pkg list | grep -E "dsd_bot_description|dsd_control_demo|pgv_guided_controller|icros_test_setup"

      - name: Ament lint (python style)
        shell: bash
        continue-on-error: true
        run: |
          set -e
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          colcon test \
            --packages-select pgv_guided_controller icros_test_setup \
            --event-handlers console_direct+ || true
          colcon test-result --verbose || true
